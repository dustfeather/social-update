# ONE-TIME, CLUSTER-ADMIN bootstrap. NOT applied by deploy.yml.
#
# deploy.yml runs IN-cluster on the `arc-df-social-update` ARC scale set and
# authenticates with that runner pod's own ServiceAccount
# (`arc-df-social-update-gha-rs-no-permission`, zero RBAC by design). This grants
# exactly the namespaced writes the workflow performs in `social-update` — no more.
#
# Apply ONCE, as cluster-admin:
#   kubectl apply -f deploy/ci-rbac.yaml
#
# RBAC (Role/RoleBinding/SA) is deliberately kept OUT of CI: the runner SA never
# gets rbac-write.
#
# Verify the runner SA name first (ARC release name == scale-set name):
#   kubectl -n arc-runners get sa | grep social-update
---
apiVersion: v1
kind: Namespace
metadata:
  name: social-update
---
# Cluster-scoped GET on the one namespace (deploy.yml does `get namespace || create`;
# `get` honours resourceNames, `create` is intentionally NOT granted — the namespace
# is pre-created above so the get short-circuits).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: social-update-ci-namespace-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["social-update"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: social-update-ci-namespace-reader
subjects:
  - kind: ServiceAccount
    name: arc-df-social-update-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: social-update-ci-namespace-reader
---
# Namespaced writes deploy.yml performs in social-update:
#   secrets                -> social-update-secrets (CLAUDE_CODE_OAUTH_TOKEN)
#   configmaps             -> nginx-tls-proxy
#   services               -> social-update
#   persistentvolumeclaims -> social-update-data
#   apps/deployments       -> social-update, nginx-tls-proxy
#   cert-manager certs     -> social-tls
# `kubectl apply` = get then create-or-patch.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: social-update-ci-deployer
  namespace: social-update
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Read-only: the final "Show result" step runs `kubectl get pods,...`.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    # watch: `kubectl rollout status` streams a watch on the deployment.
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: social-update-ci-deployer
  namespace: social-update
subjects:
  - kind: ServiceAccount
    name: arc-df-social-update-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: social-update-ci-deployer
