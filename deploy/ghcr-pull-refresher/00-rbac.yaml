# SA + Role + RoleBinding for the CronJob that refreshes social-update/ghcr-pull.
# Scoped to the social-update namespace only — it writes one Secret, nothing else.
# This is the "option B" pull-credential path: the dustfeather GitHub App mints a
# short-lived ghcr.io token (no human PAT), kept fresh in this namespace so the app
# pod can pull its private image.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghcr-pull-refresher
  namespace: social-update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghcr-pull-refresher
  namespace: social-update
rules:
  # `create` cannot be scoped to a resourceName; the named-secret update path is below.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ghcr-pull"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghcr-pull-refresher
  namespace: social-update
subjects:
  - kind: ServiceAccount
    name: ghcr-pull-refresher
    namespace: social-update
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ghcr-pull-refresher
