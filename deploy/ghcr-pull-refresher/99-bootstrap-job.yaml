# One-shot Job to populate social-update/ghcr-pull immediately, without waiting for
# the CronJob's first :00/:30 tick — the app pod can't pull its image until this
# Secret exists. deploy.yml runs this on every deploy (idempotent upsert).
apiVersion: batch/v1
kind: Job
metadata:
  name: ghcr-pull-refresher-bootstrap
  namespace: social-update
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: ghcr-pull-refresher
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: acer-laptop
      containers:
        - name: refresher
          image: ghcr.io/dustfeather/ghcr-pull-refresher:latest
          imagePullPolicy: IfNotPresent
          command: ["/scripts/refresh.sh"]
          env:
            - { name: PULL_SECRET_NAMESPACE, value: "social-update" }
            - { name: PULL_SECRET_NAME, value: "ghcr-pull" }
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "128Mi" }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          volumeMounts:
            - { name: script, mountPath: /scripts, readOnly: true }
            - { name: app-secret, mountPath: /var/run/secrets/github-app, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: script
          configMap:
            name: ghcr-pull-refresher-script
            defaultMode: 0o555
        - name: app-secret
          secret:
            secretName: github-app-dustfeather
            defaultMode: 0o444
        - name: tmp
          emptyDir: {}
