# TLS terminator for social.itguys.ro. Mirrors the cluster's nginx-tls-proxy
# convention: an nginx pod pinned to one node binds that node's hostPort 443 and
# reverse-proxies to the app over HTTP. Pinned to acer-laptop (co-located with the
# app + PVC); asus-laptop already owns its own :443 proxy, so the two never clash
# (DNS points each Mesh hostname at its node's IP). nginx runs as root only to bind
# privileged 443; the app itself stays non-root.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-tls-proxy
  namespace: social-update
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      map $http_upgrade $connection_upgrade { default upgrade; '' close; }
      server {
        listen 443 ssl;
        http2 on;
        server_name social.itguys.ro;

        ssl_certificate     /tls/tls.crt;
        ssl_certificate_key /tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 32m;     # matches the API's express.json limit (raw_json batches)
        proxy_read_timeout 600s;      # Generate shells out to the Claude CLI — allow a slow turn

        location / {
          proxy_pass http://social-update:4000;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-tls-proxy
  namespace: social-update
spec:
  replicas: 1
  strategy:
    type: Recreate          # single owner of host :443 — old pod must free it before new binds
  selector:
    matchLabels: { app: nginx-tls-proxy }
  template:
    metadata:
      labels: { app: nginx-tls-proxy }
    spec:
      nodeSelector:
        kubernetes.io/hostname: acer-laptop
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          # nginx as PID 1, plus a watcher that reloads when cert-manager rotates
          # social-tls in-place (~every 60d) so the pod doesn't serve a stale cert.
          command:
            - /bin/sh
            - -c
            - |
              LAST=$(sha256sum /tls/tls.crt 2>/dev/null | awk '{print $1}')
              ( while true; do
                  sleep 21600
                  CUR=$(sha256sum /tls/tls.crt 2>/dev/null | awk '{print $1}')
                  if [ -n "$CUR" ] && [ "$CUR" != "$LAST" ]; then
                    echo "[cert-reload] social-tls changed, reloading nginx"
                    nginx -s reload
                    LAST="$CUR"
                  fi
                done ) &
              exec nginx -g 'daemon off;'
          ports:
            - { name: https, containerPort: 443, hostPort: 443 }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
          readinessProbe:
            tcpSocket: { port: 443 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: tls,  mountPath: /tls, readOnly: true }
      volumes:
        - name: conf
          configMap: { name: nginx-tls-proxy }
        - name: tls
          secret: { secretName: social-tls }
