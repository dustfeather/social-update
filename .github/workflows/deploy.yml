name: deploy
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "deploy/**"
      - "Dockerfile"
      - "prompt.txt"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# One deploy at a time — the RWO PVC and host :443 have single owners.
concurrency:
  group: deploy-social-update
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: arc-df-social-update
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        run: |
          repo_lc="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REPO=ghcr.io/${repo_lc}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${repo_lc}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max

      - name: Render and apply Secret
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty — set it as an Actions secret"
            exit 1
          fi
          # Namespace is pre-created by the admin-applied deploy/ci-rbac.yaml; the
          # runner SA can only `get` it (create is intentionally not granted).
          kubectl get namespace social-update >/dev/null
          # --from-literal keeps the token verbatim; --dry-run|apply is idempotent.
          kubectl create secret generic social-update-secrets -n social-update \
            --from-literal=CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -n social-update -f -

      - name: Apply storage, TLS, and Service
        run: |
          kubectl apply -n social-update -f deploy/pvc.yaml
          kubectl apply -n social-update -f deploy/certificate.yaml
          kubectl apply -n social-update -f deploy/service.yaml
          kubectl apply -n social-update -f deploy/tls-proxy.yaml

      - name: Apply Deployment
        run: |
          export IMAGE
          envsubst < deploy/deployment.yaml | kubectl apply -n social-update -f -
          kubectl rollout status deployment/social-update -n social-update --timeout=180s

      - name: Show result
        run: kubectl get pods,svc,certificate -n social-update
